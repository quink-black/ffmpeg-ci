<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFmpeg HEVC Decoder - WASM Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, system-ui, sans-serif; padding: 24px; background: #1a1a2e; color: #e0e0e0; }
h1 { margin-bottom: 8px; color: #fff; }
.subtitle { color: #888; margin-bottom: 24px; }
.panel { background: #16213e; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.panel h2 { font-size: 16px; margin-bottom: 12px; color: #a0c4ff; }
label { display: block; margin-bottom: 6px; font-size: 14px; color: #aaa; }
input[type="file"] { margin-bottom: 12px; }
input[type="number"] { background: #0f3460; border: 1px solid #444; color: #fff; padding: 6px 10px; border-radius: 4px; width: 120px; }
button { background: #0f3460; color: #fff; border: 1px solid #555; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 8px; }
button:hover { background: #1a4a8a; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: #e94560; border-color: #e94560; }
.btn-primary:hover { background: #ff6b81; }
#log { background: #0a0a1a; border: 1px solid #333; border-radius: 4px; padding: 12px; font-family: 'SF Mono', Menlo, monospace; font-size: 13px; line-height: 1.5; height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
.log-info { color: #a0c4ff; }
.log-ok { color: #4ecca3; }
.log-err { color: #e94560; }
.log-perf { color: #ffd93d; }
.results { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-top: 12px; }
.stat { background: #0f3460; border-radius: 6px; padding: 12px; text-align: center; }
.stat .value { font-size: 24px; font-weight: bold; color: #fff; }
.stat .label { font-size: 12px; color: #888; margin-top: 4px; }
</style>
</head>
<body>

<h1>FFmpeg HEVC Decoder - WASM SIMD128 Test</h1>
<p class="subtitle">Browser-based testing for emsdk-built FFmpeg with WASM SIMD128 optimizations</p>

<div class="panel">
  <h2>Configuration</h2>
  <label>HEVC stream file (raw .hevc or .mp4):</label>
  <input type="file" id="inputFile" accept=".hevc,.h265,.mp4,.mkv,.ts,.265">
  <br>
  <label>Max frames to decode (0 = all):</label>
  <input type="number" id="maxFrames" value="100" min="0">
  <br><br>
  <button id="btnDecode" class="btn-primary" disabled>Decode</button>
  <button id="btnProfile" disabled>Decode + Profile</button>
  <button id="btnClear">Clear Log</button>
</div>

<div class="panel">
  <h2>Results</h2>
  <div class="results" id="results" style="display:none">
    <div class="stat"><div class="value" id="statFrames">-</div><div class="label">Frames</div></div>
    <div class="stat"><div class="value" id="statTime">-</div><div class="label">Time (ms)</div></div>
    <div class="stat"><div class="value" id="statFPS">-</div><div class="label">FPS</div></div>
    <div class="stat"><div class="value" id="statSize">-</div><div class="label">Input Size</div></div>
  </div>
</div>

<div class="panel">
  <h2>Log</h2>
  <div id="log"></div>
</div>

<script src="test.js"></script>
</body>
</html>
